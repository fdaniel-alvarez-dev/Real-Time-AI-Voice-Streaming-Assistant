<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTA — Streaming Assistant</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
      }
      body {
        margin: 0;
        background: #0b1020;
        color: #e6e9f2;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 16px;
      }
      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 14px;
      }
      label {
        display: block;
        font-size: 12px;
        opacity: 0.8;
        margin-bottom: 6px;
      }
      input,
      textarea,
      select,
      button {
        width: 100%;
        box-sizing: border-box;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        color: inherit;
        padding: 10px 12px;
      }
      button {
        cursor: pointer;
        background: rgba(83, 132, 255, 0.25);
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
      }
      .muted {
        opacity: 0.75;
        font-size: 12px;
      }
      .ok {
        color: #7ee787;
      }
      .bad {
        color: #ff7b72;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div style="font-weight: 700">Real-Time AI Voice & Streaming Assistant</div>
        <div class="muted">Minimal UI: WebSockets + SSE streaming</div>
      </div>
      <div id="status" class="muted">checking…</div>
    </header>
    <main>
      <section class="card">
        <div class="row">
          <div>
            <label>Transport</label>
            <select id="transport">
              <option value="ws">WebSocket</option>
              <option value="sse">SSE (EventSource)</option>
            </select>
          </div>
          <div>
            <label>Session</label>
            <button id="newSession">New session</button>
          </div>
        </div>
        <div style="height: 10px"></div>
        <label>sessionId</label>
        <input id="sessionId" placeholder="Click “New session”" />
        <div style="height: 10px"></div>
        <label>Your message</label>
        <textarea id="input" rows="6" placeholder="Ask about WS vs SSE, RAG, observability…"></textarea>
        <div style="height: 10px"></div>
        <button id="send">Send (stream)</button>
        <div style="height: 10px"></div>
        <div class="muted">
          SSE demo uses query params (<code>GET /v1/sse/chat?sessionId=...&q=...</code>). That’s fine for
          a local demo but not ideal for production.
        </div>
      </section>

      <section class="card">
        <div class="muted">Streaming output</div>
        <div style="height: 10px"></div>
        <pre id="output"></pre>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
